name: Update GitHub Actions Versions

on:
  schedule:
    # Every Monday at 06:00 UTC (off-peak minute to avoid stampede)
    - cron: "37 6 * * 1"
  workflow_dispatch:
  push:
    paths:
      - ".github/scripts/update-actions-list.sh"
      - ".github/workflows/update-actions.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run update script
        run: bash .github/scripts/update-actions-list.sh

      - name: Create or update PR
        run: |
          BRANCH="chore/update-actions-table"

          if git diff --quiet actions-versions.md; then
            echo "No version changes — nothing to do."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add actions-versions.md
          git commit -m "chore: update GitHub Actions version table

          Automated by update-actions-list.sh"

          git push origin "$BRANCH" --force

          # Use gh CLI — no third-party action needed
          gh pr create \
            --title "chore: update GitHub Actions version table" \
            --body "Automated by \`update-actions-list.sh\` — detected new releases from \`github.com/actions/\`." \
            --base master \
            --head "$BRANCH" \
            || gh pr edit "$BRANCH" \
              --title "chore: update GitHub Actions version table" \
              --body "Automated by \`update-actions-list.sh\` — detected new releases from \`github.com/actions/\`."
        env:
          GH_TOKEN: ${{ github.token }}
