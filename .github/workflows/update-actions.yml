name: Update GitHub Actions Versions

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "37 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run update script
        run: bash .github/scripts/update-actions-list.sh

      - name: Generate commit branch
        id: branch
        run: |
          echo "branch=update-actions-$(date +'%Y.%m.%d-%H%M')" >> "$GITHUB_OUTPUT"

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update GitHub Actions version table"
          branch: ${{ steps.branch.outputs.branch }}
          file_pattern: actions-versions.md
          create_branch: true

      - uses: everlytic/branch-merge@1.1.5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          source_ref: ${{ steps.branch.outputs.branch }}
          target_branch: master
          commit_message_template: '[Automated] Merged {source_ref} into target {target_branch}'
